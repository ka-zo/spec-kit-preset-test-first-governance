schema_version: "1.0"

preset:
  id: "test-first-governance"
  name: "Test-First Governance"
  version: "1.3.0"
  description: "Governs TDD with coverage-complete BDD/ATDD Gherkin scenarios, explicit suite ownership, professional test reports, traceability, and risk-based quality gates."
  author: "Zoltán Katona, PhD"
  repository: "https://github.com/ka-zo/spec-kit-preset-test-first-governance"
  license: "MIT"

requires:
  speckit_version: ">=0.12.11"

provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-addendum.md"
      description: "Append test-first governance principles for TDD, BDD, ATDD, and quality gates"
      strategy: "append"
    - type: "template"
      name: "spec-template"
      file: "templates/spec-addendum.md"
      description: "Append mandatory evidence ownership, Gherkin, traceability, edge-case, and acceptance coverage sections"
      strategy: "append"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-addendum.md"
      description: "Append mandatory test architecture, tooling, gate applicability, thresholds, and evidence-retention planning"
      strategy: "append"
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-addendum.md"
      description: "Append mandatory test-first task ordering, suite tags, red-green-refactor checkpoints, and validation gates"
      strategy: "append"
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-addendum.md"
      description: "Append reusable checklist criteria for TDD, BDD, ATDD, and quality gates"
      strategy: "append"
    - type: "template"
      name: "test-traceability-template"
      file: "templates/test-traceability-template.md"
      description: "Normalized requirement-to-test traceability artifact with scenario coverage matrix materialized by speckit.plan at specs/<feature>/test-traceability.md"
      strategy: "replace"
    - type: "template"
      name: "defect-log-template"
      file: "templates/defect-log-template.md"
      description: "Feature-level defect, triage, risk-acceptance, and verification-closure report materialized by speckit.plan at specs/<feature>/defect-log.md"
      strategy: "replace"
    - type: "template"
      name: "test-summary-template"
      file: "templates/test-summary-template.md"
      description: "Feature-level test summary and release-evidence report materialized by speckit.plan at specs/<feature>/test-summary.md"
      strategy: "replace"
    - type: "template"
      name: "overall-test-summary-template"
      file: "templates/overall-test-summary-template.md"
      description: "Project or release-level aggregate test summary report materialized by speckit.converge at reports/test-summary.md or reports/releases/<release-id>/test-summary.md"
      strategy: "replace"
    - type: "template"
      name: "gherkin-feature-template"
      file: "templates/gherkin-feature-template.feature"
      description: "Standalone Gherkin feature template for BDD and ATDD scenarios"
      strategy: "replace"
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Wrap constitution generation with mandatory test-first principles"
      strategy: "wrap"
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Wrap specification generation with mandatory evidence ownership and Gherkin scenario rules"
      strategy: "wrap"
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Wrap planning with mandatory test architecture, suite directories, tooling, and quality gates"
      strategy: "wrap"
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Wrap task generation to make TDD and applicable BDD/ATDD tasks mandatory and ordered before implementation"
      strategy: "wrap"
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Wrap checklist generation with test-first quality criteria"
      strategy: "wrap"
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Wrap analysis with traceability, Gherkin mirroring, and gate completeness checks"
      strategy: "wrap"
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Wrap implementation with red-green-refactor execution and mandatory validation gates"
      strategy: "wrap"
    - type: "command"
      name: "speckit.converge"
      file: "commands/speckit.converge.md"
      description: "Wrap convergence with aggregate release-level test summary reporting"
      strategy: "wrap"

tags:
  - "tdd"
  - "bdd"
  - "atdd"
  - "gherkin"
  - "quality-gates"
  - "traceability"
  - "test-first"
